<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Bride Buddy password">
    <title>Bride Buddy - Reset Password</title>

    <!-- Preconnect to font providers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/styles-luxury.css">
    <link rel="stylesheet" href="/css/components-luxury.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>
<body>
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="skip-to-main">Skip to main content</a>

    <!-- Reset Password Page Container -->
    <div class="bg-stained-glass">
        <div class="container" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: var(--space-8); padding-bottom: var(--space-8);">

            <!-- Logo -->
            <div class="animate-fade-in" style="margin-bottom: var(--space-8); text-align: center;">
                <h1 class="logo" style="font-family: var(--font-heading); font-size: var(--text-4xl); color: var(--color-gold); margin-bottom: var(--space-2); line-height: 1; text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);">
                    <span style="font-style: italic; font-weight: 400;">Bride</span>
                    <span style="font-weight: 700; letter-spacing: 0.05em;">BUDDY</span>
                </h1>
                <p style="font-family: var(--font-heading); font-size: var(--text-xl); color: var(--color-champagne); font-weight: 300; margin-top: var(--space-2);">
                    Reset Your Password
                </p>
            </div>

            <!-- Reset Password Card -->
            <main id="main-content" class="card card-gold-accent animate-fade-in-scale" style="max-width: 480px; width: 100%; animation-delay: 0.2s;">
                <form id="resetPasswordForm">
                    <p style="text-align: center; margin-bottom: var(--space-6); color: var(--color-burgundy); font-size: var(--text-sm);">
                        Enter your new password below. Make sure it's at least 6 characters long.
                    </p>

                    <!-- New Password Field -->
                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div style="position: relative;">
                            <input
                                type="password"
                                id="newPassword"
                                class="form-input"
                                placeholder="Enter new password"
                                required
                                autocomplete="new-password"
                                minlength="6"
                                style="padding-right: var(--space-10);"
                            >
                            <button
                                type="button"
                                id="toggleNewPassword"
                                class="btn-icon"
                                style="position: absolute; right: var(--space-3); top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-burgundy); padding: var(--space-2);"
                                aria-label="Toggle password visibility"
                            >
                                <svg id="eyeIconNew" style="width: 20px; height: 20px; fill: currentColor;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="form-error" id="newPasswordError" style="display: none;">Password must be at least 6 characters</div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div style="position: relative;">
                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-input"
                                placeholder="Confirm new password"
                                required
                                autocomplete="new-password"
                                minlength="6"
                                style="padding-right: var(--space-10);"
                            >
                            <button
                                type="button"
                                id="toggleConfirmPassword"
                                class="btn-icon"
                                style="position: absolute; right: var(--space-3); top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-burgundy); padding: var(--space-2);"
                                aria-label="Toggle password visibility"
                            >
                                <svg id="eyeIconConfirm" style="width: 20px; height: 20px; fill: currentColor;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="form-error" id="confirmPasswordError" style="display: none;">Passwords do not match</div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-lg btn-full" id="resetBtn">
                        Reset Password
                    </button>

                    <!-- Back to Login Link -->
                    <p style="text-align: center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--color-burgundy);">
                        Remember your password?
                        <a href="login-luxury.html" style="color: var(--color-gold); text-decoration: none; font-weight: 500;">
                            Sign In
                        </a>
                    </p>
                </form>
            </main>

            <!-- Toast Container -->
            <div id="toastContainer" class="toast-container"></div>

        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initSupabase, showToast } from '/js/shared.js';

        // Initialize Supabase
        const supabase = initSupabase();

        // Password visibility toggle for new password
        document.getElementById('toggleNewPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('newPassword');
            const eyeIcon = document.getElementById('eyeIconNew');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            }
        });

        // Password visibility toggle for confirm password
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const eyeIcon = document.getElementById('eyeIconConfirm');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            }
        });

        // Form validation
        function validateForm() {
            let isValid = true;

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const newPasswordError = document.getElementById('newPasswordError');
            const confirmPasswordError = document.getElementById('confirmPasswordError');

            // Validate new password
            if (!newPassword || newPassword.length < 6) {
                newPasswordError.style.display = 'block';
                document.getElementById('newPassword').classList.add('is-error');
                isValid = false;
            } else {
                newPasswordError.style.display = 'none';
                document.getElementById('newPassword').classList.remove('is-error');
            }

            // Validate passwords match
            if (!confirmPassword || newPassword !== confirmPassword) {
                confirmPasswordError.style.display = 'block';
                document.getElementById('confirmPassword').classList.add('is-error');
                isValid = false;
            } else {
                confirmPasswordError.style.display = 'none';
                document.getElementById('confirmPassword').classList.remove('is-error');
            }

            return isValid;
        }

        // Handle password reset form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) return;

            const newPassword = document.getElementById('newPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading-spinner"></span> Resetting password...';

            try {
                console.log('🔐 Attempting password reset');

                // Update the user's password
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    console.error('❌ Password reset error:', error);
                    throw error;
                }

                console.log('✅ Password reset successful');
                showToast('Password reset successfully! Redirecting to login...', 'success');

                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login-luxury.html';
                }, 2000);
            } catch (error) {
                console.error('❌ Error resetting password:', error);

                let errorMessage = 'Failed to reset password. Please try again or request a new reset link.';
                if (error.message) {
                    console.error('Error details:', error.message);
                    if (error.message.includes('token')) {
                        errorMessage = 'Your reset link has expired. Please request a new one from the login page.';
                    }
                }

                showToast(errorMessage, 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });

        // Clear error on input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('is-error');
                const errorElement = input.closest('.form-group').querySelector('.form-error');
                if (errorElement) {
                    errorElement.style.display = 'none';
                }
            });
        });

        // Check if user arrived via valid reset link
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = params.get('access_token');
            const type = params.get('type');

            if (type !== 'recovery') {
                console.warn('⚠️ Invalid or missing recovery token');
                showToast('Please click the link from your password reset email', 'warning');
            } else {
                console.log('✅ Valid recovery token detected');
            }
        });
    </script>

    <!-- Responsive Styles -->
    <style>
        @media (max-width: 768px) {
            .logo {
                font-size: var(--text-3xl) !important;
            }

            .card {
                padding: var(--space-6) var(--space-4) !important;
            }
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-cream);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
